name: SonarQube

# Run Sonar analysis on the main branch and on pull request updates. Pull
# request analysis is triggered when the PR is opened, updated with new commits,
# or reopened.
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

# Cancel older runs for the same branch or pull request so Sonar only receives
# the newest analysis for a given ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The scanner and checkout only need repository read access. The Sonar token is
# supplied from secrets at the scan step.
permissions:
  contents: read

jobs:
  analyze:
    name: Build, test, and analyze
    # PlatformIO native coverage and the ESP32 compile database are both
    # generated on Linux, so the whole analysis can run on ubuntu-latest.
    runs-on: ubuntu-latest

    env:
      # Directory produced by Sonar's build-wrapper around the ESP32 build. The
      # generated compile_commands.json is passed to the CFamily analyzer.
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output

      # Must match the firmware environment in platformio.ini.
      PIO_ENV: lilygo-t-display-s3

      # Must match the host test environment in platformio.ini. This environment
      # adds gcov instrumentation and excludes Arduino-only source files.
      PIO_TEST_ENV: native

      # gcovr writes Sonar generic coverage XML here. The scan step imports this
      # file through sonar.coverageReportPaths.
      SONAR_COVERAGE_REPORT: coverage-sonarqube.xml

    steps:
      # Checkout with full history so Sonar can compute blame, changed-code
      # metrics, and pull request analysis accurately.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Fail early when the Sonar project key is missing. This avoids spending
      # time installing PlatformIO and building firmware before the scan fails.
      - name: Require Sonar project key
        env:
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "::error::Set repository variable SONAR_PROJECT_KEY or secret SONAR_PROJECT_KEY to your Sonar project key."
            exit 1
          fi

      # PlatformIO is installed through pip, so set up a known Python version for
      # reproducible installs on GitHub-hosted runners.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache PlatformIO packages and pip downloads. The key is tied to
      # platformio.ini because board packages and library dependencies are
      # controlled there.
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: >-
            ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}

      # Install PlatformIO and gcovr. PlatformIO builds/tests the project; gcovr
      # converts GCC coverage data into SonarQube's generic coverage XML format.
      - name: Install PlatformIO and coverage tools
        run: |
          python -m pip install --upgrade pip wheel
          pip install "platformio>=6,<7" "gcovr>=8,<9"

      # Install the Sonar build-wrapper that traces the ESP32 firmware build and
      # emits compile_commands.json for C/C++ analysis.
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v8.0.0
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}

      # Run native unit tests before the scan. The native environment in
      # platformio.ini enables --coverage, so this produces .gcda/.gcno files for
      # gcovr to consume.
      - name: Test with coverage
        run: pio test -e "${PIO_TEST_ENV}" -vvv

      # Convert native gcov output into Sonar generic coverage XML. Test code,
      # PlatformIO internals, and generated build directories are excluded so the
      # report focuses on project source and headers.
      - name: Generate Sonar coverage report
        run: |
          gcovr \
            --root . \
            --filter "src" \
            --filter "include" \
            --exclude "test" \
            --exclude ".pio" \
            --sonarqube "${SONAR_COVERAGE_REPORT}" \
            --print-summary

      # Fail the workflow early if coverage was not generated. Without this
      # guard, Sonar can complete analysis while showing missing or 0.0% coverage.
      - name: Verify coverage report
        run: |
          if [ ! -s "${SONAR_COVERAGE_REPORT}" ]; then
            echo "::error::No Sonar coverage report was generated at ${SONAR_COVERAGE_REPORT}."
            exit 1
          fi

          echo "Found coverage report: ${SONAR_COVERAGE_REPORT}"

      # Build the firmware inside Sonar's build-wrapper so CFamily analysis sees
      # the real ESP32/Arduino compile commands rather than the simplified native
      # test build.
      - name: Build firmware with build-wrapper
        shell: bash
        run: |
          set -euo pipefail
          build-wrapper-linux-x86-64 \
            --out-dir "${BUILD_WRAPPER_OUT_DIR}" \
            pio run -e "${PIO_ENV}"

      # Upload coverage as a workflow artifact for debugging. If Sonar ever
      # reports unexpected coverage, this file lets us inspect exactly what the
      # scanner received.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: sonar-coverage-report
          path: ${{ env.SONAR_COVERAGE_REPORT }}

      # Run SonarQube/SonarCloud analysis. For C/C++, compile_commands.json comes
      # from build-wrapper, while test coverage is imported from gcovr's generic
      # Sonar XML report.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: >-
            --define sonar.projectName=SensorSimulator
            --define sonar.sources=src,include
            --define sonar.tests=test
            --define sonar.sourceEncoding=UTF-8
            --define sonar.exclusions=.pio/**,.vscode/**
            --define sonar.coverageReportPaths=${{ env.SONAR_COVERAGE_REPORT }}
            --define sonar.projectKey=${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
            --define sonar.cfamily.compile-commands=${{ github.workspace }}/${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            ${{ vars.SONAR_ORGANIZATION != '' && format('--define sonar.organization={0}', vars.SONAR_ORGANIZATION) || '' }}
