# Sonar C/C++ analysis for this PlatformIO (ESP32) project.
#
# GitHub setup:
#   - Secret: SONAR_TOKEN (SonarQube Server or SonarQube Cloud token).
#   - Variable: SONAR_PROJECT_KEY (required; must match the project key in Sonar).
#   - Variable: SONAR_ORGANIZATION (SonarQube Cloud only; leave unset for SonarQube Server).
#   - Variable: SONAR_HOST_URL (optional; defaults to SonarQube Cloud if unset — override for SonarQube Server).
#
# Older SonarQube Server (<10.6): swap compile_commands for build-wrapper-output in the Scan step —
# https://docs.sonarsource.com/sonarqube-server/latest/analyzing-source-code/languages/c-family/

name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Build and analyze
    runs-on: ubuntu-latest

    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output
      # Must match `[env]` in platformio.ini
      PIO_ENV: lilygo-t-display-s3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: >-
            ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip wheel
          pip install "platformio>=6,<7"

      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v8.0.0
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}

      - name: Build with PlatformIO (instrumented)
        shell: bash
        run: |
          set -euo pipefail
          build-wrapper-linux-x86-64 \
            --out-dir "${BUILD_WRAPPER_OUT_DIR}" \
            pio run -e "${PIO_ENV}"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: >-
            --define sonar.projectName=SensorSimulator
            --define sonar.sources=src,include
            --define sonar.sourceEncoding=UTF-8
            --define sonar.exclusions=.pio/**,.vscode/**
            --define sonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            --define sonar.cfamily.compile-commands=${{ github.workspace }}/${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            ${{ vars.SONAR_ORGANIZATION != '' && format('--define sonar.organization={0}', vars.SONAR_ORGANIZATION) || '' }}
