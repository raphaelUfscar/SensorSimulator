name: PlatformIO CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip wheel
          pip install "platformio>=6"

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Run Unit Tests (Native)
        run: pio test -e native

      - name: Process Coverage
        run: |
          lcov --directory . --capture --output-file coverage.info
          # Remove system headers and test files from the report
          lcov --remove coverage.info '*/test/*' '*/.pio/*' '*/test_*.cpp' --output-file coverage.info
          genhtml coverage.info --output-directory coverage-report

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage-report/

      - name: Verify Build (ESP32)
        run: pio run -e lilygo-t-display-s3
        # This ensures that hardware-specific code still compiles 
        # even if it's not covered by native tests.