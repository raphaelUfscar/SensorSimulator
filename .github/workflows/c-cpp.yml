# Continuous integration for this PlatformIO (ESP32 / Arduino) firmware project.

name: PlatformIO CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Must match `[env]` in platformio.ini
  PIO_ENV: lilygo-t-display-s3

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: >-
            ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip wheel
          pip install "platformio>=6,<7"

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Static analysis (cppcheck)
        continue-on-error: true
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem -I include src/ include/

      - name: Build firmware
        run: pio run -e "${PIO_ENV}"
